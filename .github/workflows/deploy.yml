name: Deploy

# Every merge to main ships automatically (decision 2026-07-15, from the
# practice-season retro): migrations first, then the Fly backend. Frontend
# deploys separately via Vercel's own GitHub integration.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'supabase/migrations/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        run: flyctl deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
