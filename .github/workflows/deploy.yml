name: Deploy

# Every merge to main ships automatically (decision 2026-07-15, from the
# practice-season retro): migrations first, then the Fly backend. Frontend
# deploys separately via Vercel's own GitHub integration.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'supabase/migrations/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        run: flyctl deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Migrations land before the app deploys, so a failed or unhealthy
      # deploy leaves the old image on a new schema (issue #119). This step
      # turns that window into a failed (and emailed) workflow run instead
      # of a silent one. Retries cover the Fly cold start.
      - name: Verify backend health
        run: |
          curl --fail --silent --show-error --max-time 30 \
            --retry 5 --retry-delay 5 --retry-all-errors \
            https://tribal-knowledge-app.fly.dev/health
