# fly.toml app configuration file generated for tribal-knowledge-app on 2026-07-10T18:36:08-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tribal-knowledge-app'
primary_region = 'sjc'

[build]

[env]
  CORS_ORIGIN_REGEX = 'https://tribal-knowledge-[a-z0-9]+-dtiern55s-projects\.vercel\.app|https://tribal-knowledge-git-[a-z0-9-]+-dtiern55s-projects\.vercel\.app'
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
